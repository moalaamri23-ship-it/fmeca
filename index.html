<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <link rel="manifest" href="manifest.webmanifest" /> -->
    <meta name="theme-color" content="#0f172a">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMECA Studio</title>
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config={
        theme:{
          extend:{
            fontFamily:{
              sans:['Inter','sans-serif'],
              mono:['JetBrains Mono','monospace']
            },
            colors:{
              slate:{850:'#1e293b',900:'#0f172a'},
              brand:{500:'#3b82f6',600:'#2563eb',700:'#1d4ed8'}
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar to match original behavior */
      .scroll-thin::-webkit-scrollbar{width:8px;height:8px}
      .scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
      .scroll-thin::-webkit-scrollbar-track{background:transparent}
      
      /* Animation */
      .animate-enter{animation:fadeIn 0.3s ease-out forwards}
      @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
      
      /* ── Tree viewport ── */
      .tree-viewport { width: 100%; min-height: 300px; padding-bottom: 60px; overflow: auto; }

      /* ══════════════════════════════════════════════════════════════
         TOP-DOWN TREE  —  root at top, siblings spread horizontally.
         Vertical depth is fixed at 4 levels; width scales with count.
         ══════════════════════════════════════════════════════════════ */

      /* Tree container: expands to natural content size */
      .tf-tree { display: inline-block; min-width: 100%; }

      /* Siblings spread in a row, centred under their parent */
      .tf-tree ul {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: flex-start;
        justify-content: center;
        padding: 0;
        margin: 0;
        position: relative;
      }

      /* Each node: card on top, children ul below */
      .tf-tree li {
        list-style-type: none;
        position: relative;
        padding: 40px 8px 0;   /* 40 px top = space for incoming connector */
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Horizontal bus connecting siblings at the very top of each li */
      .tf-tree li::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: #cbd5e1;
        z-index: 0;
      }
      /* First child: bus runs only from its own centre rightward */
      .tf-tree li:first-child::before  { left: 50%; }
      /* Last child: bus runs only from left to its own centre */
      .tf-tree li:last-child::before   { right: 50%; }
      /* Only child: no sibling bus needed */
      .tf-tree li:only-child::before   { display: none; }

      /* Vertical drop from bus level (top: 0) down to the card */
      .tf-tree li::after {
        content: '';
        position: absolute;
        top: 0;
        left: calc(50% - 1px);   /* centres the 2 px line */
        width: 2px;
        height: 40px;
        background: #cbd5e1;
        z-index: 0;
      }

      /* Root node has no incoming connectors */
      .tf-tree > ul > li           { padding-top: 0; }
      .tf-tree > ul > li::before   { display: none; }
      .tf-tree > ul > li::after    { display: none; }

      /* Card wrapper */
      .node-wrapper { position: relative; z-index: 10; }

      /* Vertical stub going DOWN from card to the children's bus */
      .node-wrapper.has-children::after {
        content: '';
        position: absolute;
        left: calc(50% - 1px);
        bottom: -40px;
        top: auto; right: auto;
        width: 2px;
        height: 40px;
        background: #cbd5e1;
        border: none;
        z-index: 0;
      }

      /* ── Collapsed state: hide outgoing stub + children list ── */
      .tf-tree li.is-collapsed > .node-wrapper.has-children::after { display: none !important; }
      .tf-tree li.is-collapsed > ul                                 { display: none !important; }

      /* Merged table print styles */
      .merged-table th { background-color: #f1f5f9; position: sticky; top: 0; z-index: 10; border: 1px solid #cbd5e1; padding: 8px; font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; }
      .merged-table td { border: 1px solid #e2e8f0; padding: 8px; font-size: 12px; vertical-align: top; background: white; }
      .merged-table tr:hover td { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-700 overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
