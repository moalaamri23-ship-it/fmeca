<!DOCTYPE html>
<html>
<head><title>Select Folder</title></head>
<body style="font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f8fafc;color:#334155">
<p>Select a folder…</p>
<script>
(async () => {
  try {
    var handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    window.opener.postMessage({ type: 'fmeca-folder-picked', handle: handle }, window.location.origin);
  } catch (e) {
    window.opener.postMessage({ type: 'fmeca-folder-cancelled', error: (e && e.message) || 'cancelled' }, window.location.origin);
  }
  window.close();
})();
</script>
</body>
</html>
