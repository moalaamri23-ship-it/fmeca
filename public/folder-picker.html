<!DOCTYPE html>
<html>
<head>
  <title>Select Folder</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; background: #f8fafc; color: #334155; }
    p { font-size: 15px; }
  </style>
</head>
<body>
  <p>Opening folder picker…</p>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const targetOrigin = params.get('origin') || window.location.origin;
      try {
        const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
        window.opener.postMessage({ type: 'fmeca-folder-picked', handle }, targetOrigin);
      } catch (e) {
        window.opener.postMessage({ type: 'fmeca-folder-cancelled', error: e.message }, targetOrigin);
      }
      window.close();
    })();
  </script>
</body>
</html>
